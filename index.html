<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ChatMiFan Pro</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        .hidden { display: none !important; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .icon { width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .btn-play { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="text-align:center; padding-top:50px;">
        <h1>ChatMiFan</h1>
        <input type="text" id="login-user" placeholder="Tên tài khoản"><br>
        <button onclick="handleLogin()">Đăng nhập</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <header style="background:white; padding:10px; position:sticky; top:0; z-index:100; text-align:center;">
        <div style="display:flex; justify-content:center; align-items:center; gap:10px;">
            <div class="icon" onclick="showPage('games')">🎮</div>
            <strong>ChatMiFan</strong>
            <div id="online-count" style="font-size:12px; border:1px solid #ccc; padding:2px 5px; border-radius:4px;">128 đang online</div>
        </div>
        <div style="display:flex; justify-content:center; gap:15px; margin-top:10px;">
            <div class="icon" onclick="showPage('home')">🏠</div>
            <div class="icon" onclick="showPage('messenger')">💬</div>
            <div class="icon" onclick="showPage('profile')">👤</div>
        </div>
    </header>

    <div id="pages" class="container">
        <div id="page-games" class="page hidden">
            <h3>Trung tâm Game</h3>
            <div class="card">
                <p>1. Hứng quà (Dễ)</p>
                <button class="btn-play" onclick="playGame()">Play</button>
            </div>
            <div class="card">
                <p>2. Toán nhanh (Khó)</p>
                <button class="btn-play" onclick="playGame()">Play</button>
            </div>
        </div>

        <div id="page-profile" class="page hidden">
            <div class="card">
                <h2 id="profile-name"></h2>
                <p>Tổng điểm: <span id="my-score">0</span></p>
                <button onclick="logout()">Đăng xuất</button>
            </div>
        </div>
        
        <div id="page-home" class="page"><h3>Bảng tin hoạt động...</h3></div>
    </div>
</div>

<script>
    let currentUser = JSON.parse(localStorage.getItem('cmf_me'));
    
    // Tự động làm mới số người online mỗi 5 giây
    setInterval(() => {
        let count = 120 + Math.floor(Math.random() * 20);
        document.getElementById('online-count').innerText = count + " đang online";
    }, 5000);

    if(currentUser) startApp();

    function startApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
    }

    function handleLogin() {
        let u = document.getElementById('login-user').value;
        if(!u) return;
        currentUser = { name: u, score: parseInt(localStorage.getItem('score_'+u)) || 0 };
        localStorage.setItem('cmf_me', JSON.stringify(currentUser));
        startApp();
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
        document.getElementById('page-' + p).classList.remove('hidden');
        if(p === 'profile') {
            document.getElementById('profile-name').innerText = currentUser.name;
            document.getElementById('my-score').innerText = currentUser.score;
        }
    }

    function playGame() {
        if(confirm("Thắng sẽ được cộng 10 điểm! Bạn muốn chơi chứ?")) {
            alert("Chúc mừng bạn thắng! Cộng 10 điểm.");
            currentUser.score += 10;
            localStorage.setItem('score_'+currentUser.name, currentUser.score);
            localStorage.setItem('cmf_me', JSON.stringify(currentUser));
        } else {
            alert("Bạn đã thua!");
        }
    }

    function logout() { localStorage.removeItem('cmf_me'); location.reload(); }
</script>
</body>
</html>
