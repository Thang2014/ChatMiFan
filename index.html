<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatMiFan</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        
        /* Auth Screen */
        #auth-screen { width: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: white; position: fixed; top: 0; z-index: 1000; }
        .auth-box { width: 300px; padding: 20px; text-align: center; border: 1px solid #ddd; border-radius: 10px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }

        /* App */
        header { background: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; border-bottom: 1px solid #ddd; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .post-media { width: 100%; margin-top: 10px; }
        nav { display: flex; gap: 15px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2>ChatMiFan</h2>
        <div id="login-form">
            <input type="text" id="login-user" placeholder="Tên tài khoản">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button onclick="handleLogin()">Đăng nhập</button>
            <p onclick="toggleAuth(false)" style="color:blue; cursor:pointer;">Đăng ký tài khoản</p>
        </div>
        <div id="reg-form" class="hidden">
            <input type="text" id="reg-user" placeholder="Tên muốn tạo">
            <input type="password" id="reg-pass" placeholder="Mật khẩu">
            <button onclick="handleRegister()">Đăng ký</button>
            <p onclick="toggleAuth(true)" style="color:blue; cursor:pointer;">Quay lại</p>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <header>
        <strong>ChatMiFan</strong>
        <div id="online-count">0 đang online</div>
        <nav>
            <button onclick="showPage('home')">🏠</button>
            <button onclick="showPage('profile')">👤</button>
        </nav>
    </header>

    <div id="page-home" class="page container">
        <div class="card">
            <input type="text" id="post-text" placeholder="Bạn đang nghĩ gì?">
            <input type="file" id="post-file" accept="image/*,video/*">
            <button onclick="createPost()">Đăng bài</button>
        </div>
        <div id="newsfeed"></div>
    </div>

    <div id="page-profile" class="page container hidden">
        <div class="card" style="text-align:center;">
            <h2 id="profile-name"></h2>
            <button onclick="editName()">Đổi tên</button>
            <button onclick="logout()" style="background:red;">Đăng xuất</button>
        </div>
        <h3>Bài của tôi:</h3>
        <div id="my-posts"></div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('cmf_users')) || {};
    let posts = JSON.parse(localStorage.getItem('cmf_posts')) || [];
    let currentUser = null;

    // Ghi nhớ đăng nhập
    window.onload = () => {
        let saved = localStorage.getItem('cmf_logged_in_user');
        if(saved && users[saved]) { currentUser = users[saved]; startApp(); }
    };

    function startApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('profile-name').innerText = currentUser.name;
        document.getElementById('online-count').innerText = "1 đang online";
        renderAll();
    }

    function handleLogin() {
        let u = document.getElementById('login-user').value.trim();
        let p = document.getElementById('login-pass').value.trim();
        if(users[u] && users[u].password === p) {
            currentUser = users[u];
            localStorage.setItem('cmf_logged_in_user', u);
            startApp();
        } else alert("Sai tài khoản hoặc mật khẩu!");
    }

    function handleRegister() {
        let u = document.getElementById('reg-user').value.trim();
        let p = document.getElementById('reg-pass').value.trim();
        if(users[u]) return alert("Tài khoản đã tồn tại!");
        users[u] = { username: u, password: p, name: u };
        localStorage.setItem('cmf_users', JSON.stringify(users));
        alert("Đăng ký thành công!"); toggleAuth(true);
    }

    function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('reg-form').classList.toggle('hidden', l); }
    
    function createPost() {
        let txt = document.getElementById('post-text').value;
        let file = document.getElementById('post-file').files[0];
        let p = { id: Date.now(), author: currentUser.username, content: txt };
        if(file) {
            let r = new FileReader();
            r.onload = (e) => { p.media = e.target.result; finishPost(p); };
            r.readAsDataURL(file);
        } else finishPost(p);
    }

    function finishPost(p) {
        posts.unshift(p);
        localStorage.setItem('cmf_posts', JSON.stringify(posts));
        renderAll();
    }

    function renderAll() {
        document.getElementById('newsfeed').innerHTML = posts.map(p => `
            <div class="card"><b>${p.author}</b><p>${p.content}</p>${p.media?`<img src="${p.media}" class="post-media">`:''}</div>
        `).join('');
        document.getElementById('my-posts').innerHTML = posts.filter(p => p.author === currentUser.username).map(p => `
            <div class="card">${p.content} <button onclick="deletePost(${p.id})">Gỡ</button></div>
        `).join('');
    }

    function deletePost(id) {
        posts = posts.filter(p => p.id !== id);
        localStorage.setItem('cmf_posts', JSON.stringify(posts));
        renderAll();
    }

    function showPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.add('hidden')); document.getElementById('page-'+p).classList.remove('hidden'); }
    function logout() { localStorage.removeItem('cmf_logged_in_user'); location.reload(); }
    function editName() { let n = prompt("Tên mới:", currentUser.name); if(n) { currentUser.name = n; localStorage.setItem('cmf_users', JSON.stringify(users)); location.reload(); } }
</script>
</body>
</html>
