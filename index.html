<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatMiFan</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
        .post-media { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card">
        <h1>ChatMiFan</h1>
        <input type="text" id="login-user" placeholder="Tên tài khoản"><br>
        <input type="password" id="login-pass" placeholder="Mật khẩu"><br>
        <button onclick="handleLogin()">Đăng nhập</button>
    </div>
</div>

<div id="main-app" class="hidden">
    <header style="background:white; padding:10px; text-align:center;">
        <div id="online-count">0 đang online</div>
        <nav><button onclick="showPage('home')">🏠</button><button onclick="showPage('profile')">👤</button></nav>
    </header>

    <div id="page-home" class="page container">
        <div class="card">
            <input type="text" id="post-text" placeholder="Bạn đang nghĩ gì?">
            <input type="file" id="post-file" accept="image/*,video/*">
            <button onclick="createPost()">Đăng bài</button>
        </div>
        <div id="newsfeed"></div>
    </div>

    <div id="page-profile" class="page container hidden">
        <div class="card" style="text-align:center;">
            <img id="my-avatar" class="avatar" src="https://via.placeholder.com/60">
            <h2 id="profile-name"></h2>
            <button onclick="editName()">Đổi tên</button>
        </div>
        <h3>Bài viết của bạn:</h3>
        <div id="my-posts"></div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('cmf_users')) || {};
    let posts = JSON.parse(localStorage.getItem('cmf_posts')) || [];
    let currentUser = null;

    function createPost() {
        let txt = document.getElementById('post-text').value;
        let fileInput = document.getElementById('post-file');
        let file = fileInput.files[0];
        let p = { id: Date.now(), author: currentUser.username, content: txt };
        
        if(file) {
            let r = new FileReader();
            r.onload = (e) => { p.media = e.target.result; finishPost(p); };
            r.readAsDataURL(file);
        } else { finishPost(p); }
    }

    function finishPost(p) {
        posts.unshift(p);
        localStorage.setItem('cmf_posts', JSON.stringify(posts));
        renderAll();
    }

    function renderAll() {
        // Feed trang chủ
        document.getElementById('newsfeed').innerHTML = posts.map(p => `
            <div class="card"><b>${p.author}</b><p>${p.content}</p>${p.media?`<img src="${p.media}" class="post-media">`:''}</div>
        `).join('');

        // Bài của tôi
        let myPosts = posts.filter(p => p.author === currentUser.username);
        document.getElementById('my-posts').innerHTML = myPosts.map(p => `
            <div class="card">${p.content} <button onclick="deletePost(${p.id})">Gỡ</button></div>
        `).join('');
    }

    function deletePost(id) {
        posts = posts.filter(p => p.id !== id);
        localStorage.setItem('cmf_posts', JSON.stringify(posts));
        renderAll();
    }

    function editName() {
        let n = prompt("Tên mới:");
        if(n) { currentUser.name = n; document.getElementById('profile-name').innerText = n; }
    }

    // Các hàm logic khác...
    function showPage(p) { 
        document.querySelectorAll('.page').forEach(el => el.classList.add('hidden')); 
        document.getElementById('page-'+p).classList.remove('hidden'); 
    }
    
    // ... (Giữ nguyên các hàm login, startApp như cũ)
</script>
</body>
</html>
