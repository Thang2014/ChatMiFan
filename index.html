<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>ChatMiFan</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .hidden { display: none !important; }
        .container { max-width: 500px; margin: auto; padding: 10px; padding-bottom: 70px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: white; padding: 10px 0; border-top: 1px solid #ddd; }
        .post-media { width: 100%; margin-top: 10px; border-radius: 8px; }
        button { cursor: pointer; border: none; background: #eee; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="container card" style="margin-top:100px; text-align:center;">
        <h1>ChatMiFan</h1>
        <div id="login-form">
            <input type="text" id="login-user" placeholder="Tên" style="width:90%; padding:8px;"><br>
            <input type="password" id="login-pass" placeholder="Mật khẩu" style="width:90%; padding:8px;"><br>
            <button onclick="handleLogin()" style="width:95%; background:var(--primary); color:white;">Đăng nhập</button>
            <p onclick="toggleAuth(false)" style="color:blue; cursor:pointer;">Đăng ký</p>
        </div>
        <div id="reg-form" class="hidden">
            <input type="text" id="reg-user" placeholder="Tên mới" style="width:90%; padding:8px;"><br>
            <input type="password" id="reg-pass" placeholder="Mật khẩu" style="width:90%; padding:8px;"><br>
            <button onclick="handleRegister()" style="width:95%; background:green; color:white;">Đăng ký</button>
            <p onclick="toggleAuth(true)" style="color:blue; cursor:pointer;">Quay lại</p>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <div style="background:white; padding:10px; text-align:center; position:sticky; top:0; z-index:100;">
        <strong>ChatMiFan</strong> - <span id="online-count">1 đang online</span>
    </div>

    <div id="page-home" class="page container"><div class="card"><input type="text" id="post-text" placeholder="Đang nghĩ gì?"> <input type="file" id="post-file" accept="image/*,video/*"> <button onclick="createPost()">Đăng</button></div><div id="newsfeed"></div></div>
    <div id="page-search" class="page container hidden"><h3>Tìm kiếm</h3><input type="text" id="search-input" onkeyup="doSearch()"> <div id="search-results"></div></div>
    <div id="page-messenger" class="page container hidden"><h3>Nhắn tin</h3><div id="chat-list"></div></div>
    <div id="page-notif" class="page container hidden"><h3>Thông báo</h3><div id="notif-list"></div></div>
    <div id="page-profile" class="page container hidden">
        <div class="card" style="text-align:center;">
            <img id="my-avatar" class="avatar" style="width:100px; height:100px;" onclick="changeAvatar()">
            <h2 id="profile-name"></h2>
            <button onclick="editName()">Đổi tên</button> <button onclick="logout()">Đăng xuất</button>
        </div>
        <div id="my-posts"></div>
    </div>

    <div class="nav-bar">
        <button onclick="showPage('home')">🏠</button>
        <button onclick="showPage('search')">🔍</button>
        <button onclick="showPage('messenger')">💬</button>
        <button onclick="showPage('notif')">🔔</button>
        <button onclick="showPage('profile')">👤</button>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('cmf_users')) || {};
    let posts = JSON.parse(localStorage.getItem('cmf_posts')) || [];
    let currentUser = null;

    window.onload = () => {
        let s = localStorage.getItem('cmf_logged_in_user');
        if(s && users[s]) { currentUser = users[s]; startApp(); }
        setInterval(() => document.getElementById('online-count').innerText = (120 + Math.floor(Math.random()*15)) + " đang online", 5000);
    };

    function startApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('profile-name').innerText = currentUser.name;
        document.getElementById('my-avatar').src = currentUser.avatar || 'https://via.placeholder.com/100';
        renderAll();
    }

    function handleLogin() {
        let u = document.getElementById('login-user').value.trim();
        let p = document.getElementById('login-pass').value.trim();
        if(users[u] && users[u].password === p) { currentUser = users[u]; localStorage.setItem('cmf_logged_in_user', u); startApp(); }
        else alert("Sai!");
    }

    function handleRegister() {
        let u = document.getElementById('reg-user').value.trim();
        let p = document.getElementById('reg-pass').value.trim();
        if(!users[u]) { users[u] = {username: u, password: p, name: u, avatar: 'https://via.placeholder.com/100'}; localStorage.setItem('cmf_users', JSON.stringify(users)); alert("OK!"); toggleAuth(true); }
    }

    function changeAvatar() {
        let i = document.createElement('input'); i.type='file'; i.accept='image/*';
        i.onchange = e => { let r = new FileReader(); r.onload = ev => { currentUser.avatar = ev.target.result; users[currentUser.username].avatar = ev.target.result; localStorage.setItem('cmf_users', JSON.stringify(users)); document.getElementById('my-avatar').src = ev.target.result; }; r.readAsDataURL(e.target.files[0]); };
        i.click();
    }

    function createPost() {
        let txt = document.getElementById('post-text').value;
        let file = document.getElementById('post-file').files[0];
        let p = {id: Date.now(), author: currentUser.username, content: txt};
        if(file) { let r = new FileReader(); r.onload = e => { p.media = e.target.result; posts.unshift(p); localStorage.setItem('cmf_posts', JSON.stringify(posts)); renderAll(); }; r.readAsDataURL(file); }
        else { posts.unshift(p); localStorage.setItem('cmf_posts', JSON.stringify(posts)); renderAll(); }
    }

    function renderAll() {
        document.getElementById('newsfeed').innerHTML = posts.map(p => `<div class="card"><b>${p.author}</b><p>${p.content}</p>${p.media?`<img src="${p.media}" class="post-media">`:''}</div>`).join('');
        document.getElementById('my-posts').innerHTML = posts.filter(p => p.author === currentUser.username).map(p => `<div class="card">${p.content} <button onclick="deletePost(${p.id})">Gỡ</button></div>`).join('');
    }

    function deletePost(id) { posts = posts.filter(p => p.id !== id); localStorage.setItem('cmf_posts', JSON.stringify(posts)); renderAll(); }
    function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('reg-form').classList.toggle('hidden', l); }
    function showPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.add('hidden')); document.getElementById('page-'+p).classList.remove('hidden'); }
    function logout() { localStorage.removeItem('cmf_logged_in_user'); location.reload(); }
    function editName() { let n = prompt("Tên mới:", currentUser.name); if(n) { currentUser.name = n; users[currentUser.username].name = n; localStorage.setItem('cmf_users', JSON.stringify(users)); location.reload(); } }
</script>
</body>
</html>
