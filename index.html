<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatMiFan</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: Arial, sans-serif; background: var(--bg); margin: 0; }
        .hidden { display: none !important; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .header { background: white; padding: 10px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; border-bottom: 1px solid #ddd; z-index: 100; }
        .nav-bar { display: flex; justify-content: space-around; background: white; padding: 10px; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; }
        button { cursor: pointer; border: none; background: none; font-size: 20px; }
        .post-media { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="container card" style="margin-top:50px;">
        <h2>Đăng nhập ChatMiFan</h2>
        <div id="login-form">
            <input type="text" id="login-user" placeholder="Tên" style="width:90%; padding:8px;">
            <input type="password" id="login-pass" placeholder="Mật khẩu" style="width:90%; padding:8px;">
            <button onclick="handleLogin()" style="width:100%; background:var(--primary); color:white; padding:10px;">Đăng nhập</button>
            <p onclick="toggleAuth(false)" style="color:blue; cursor:pointer;">Chưa có tài khoản? Đăng ký</p>
        </div>
        <div id="reg-form" class="hidden">
            <input type="text" id="reg-user" placeholder="Tên mới" style="width:90%; padding:8px;">
            <input type="password" id="reg-pass" placeholder="Mật khẩu" style="width:90%; padding:8px;">
            <button onclick="handleRegister()" style="width:100%; background:green; color:white; padding:10px;">Đăng ký</button>
            <p onclick="toggleAuth(true)" style="color:blue; cursor:pointer;">Quay lại đăng nhập</p>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <div class="header"><strong>ChatMiFan</strong> <span id="online-count">0 đang online</span></div>

    <div id="page-home" class="page container">
        <div class="card">
            <input type="text" id="post-text" placeholder="Đang nghĩ gì?">
            <input type="file" id="post-file" accept="image/*,video/*">
            <button onclick="createPost()">Đăng</button>
        </div>
        <div id="newsfeed"></div>
    </div>

    <div id="page-search" class="page container hidden"><h3>Tìm kiếm</h3><input type="text" id="search-input" onkeyup="doSearch()"></div>
    <div id="page-messenger" class="page container hidden"><h3>Nhắn tin</h3></div>
    <div id="page-notif" class="page container hidden"><h3>Thông báo</h3></div>
    <div id="page-profile" class="page container hidden">
        <div class="card" style="text-align:center;">
            <h2 id="profile-name"></h2>
            <button onclick="editName()">Đổi tên</button>
            <button onclick="logout()" style="color:red;">Đăng xuất</button>
        </div>
        <div id="my-posts"></div>
    </div>

    <div class="nav-bar">
        <button onclick="showPage('home')">🏠</button>
        <button onclick="showPage('search')">🔍</button>
        <button onclick="showPage('messenger')">💬</button>
        <button onclick="showPage('notif')">🔔</button>
        <button onclick="showPage('profile')">👤</button>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('cmf_users')) || {};
    let posts = JSON.parse(localStorage.getItem('cmf_posts')) || [];
    let currentUser = null;

    // Tự động khôi phục đăng nhập
    window.onload = () => {
        let saved = localStorage.getItem('cmf_logged_in_user');
        if(saved && users[saved]) { currentUser = users[saved]; startApp(); }
    };

    function startApp() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('profile-name').innerText = currentUser.name;
        document.getElementById('online-count').innerText = "1 đang online";
        renderAll();
    }

    function handleLogin() {
        let u = document.getElementById('login-user').value.trim();
        let p = document.getElementById('login-pass').value.trim();
        if(users[u] && users[u].password === p) {
            currentUser = users[u];
            localStorage.setItem('cmf_logged_in_user', u);
            startApp();
        } else alert("Sai!");
    }

    function handleRegister() {
        let u = document.getElementById('reg-user').value.trim();
        let p = document.getElementById('reg-pass').value.trim();
        if(users[u]) return alert("Đã tồn tại!");
        users[u] = { username: u, password: p, name: u };
        localStorage.setItem('cmf_users', JSON.stringify(users));
        alert("Thành công!"); toggleAuth(true);
    }

    function toggleAuth(l) { document.getElementById('login-form').classList.toggle('hidden', !l); document.getElementById('reg-form').classList.toggle('hidden', l); }
    function showPage(p) { document.querySelectorAll('.page').forEach(el => el.classList.add('hidden')); document.getElementById('page-'+p).classList.remove('hidden'); }
    function logout() { localStorage.removeItem('cmf_logged_in_user'); location.reload(); }

    function createPost() {
        let txt = document.getElementById('post-text').value;
        let file = document.getElementById('post-file').files[0];
        let p = { id: Date.now(), author: currentUser.username, content: txt };
        if(file) {
            let r = new FileReader();
            r.onload = (e) => { p.media = e.target.result; finishPost(p); };
            r.readAsDataURL(file);
        } else finishPost(p);
    }

    function finishPost(p) { posts.unshift(p); localStorage.setItem('cmf_posts', JSON.stringify(posts)); renderAll(); }

    function renderAll() {
        document.getElementById('newsfeed').innerHTML = posts.map(p => `
            <div class="card"><b>${p.author}</b><p>${p.content}</p>${p.media?`<img src="${p.media}" class="post-media">`:''}</div>
        `).join('');
        document.getElementById('my-posts').innerHTML = posts.filter(p => p.author === currentUser.username).map(p => `
            <div class="card">${p.content} <button onclick="deletePost(${p.id})">Gỡ</button></div>
        `).join('');
    }

    function deletePost(id) { posts = posts.filter(p => p.id !== id); localStorage.setItem('cmf_posts', JSON.stringify(posts)); renderAll(); }
    function editName() { let n = prompt("Tên mới:", currentUser.name); if(n) { currentUser.name = n; localStorage.setItem('cmf_users', JSON.stringify(users)); location.reload(); } }
</script>
</body>
</html>
