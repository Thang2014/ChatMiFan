<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatMiFan Full</title>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; }
        .hidden { display: none !important; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .header-icon { width: 40px; height: 40px; background: #e4e6eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        /* Game Styles */
        #game-canvas { width: 100%; height: 250px; background: #222; position: relative; overflow: hidden; margin-top: 10px; }
        .item { width: 25px; height: 25px; background: gold; position: absolute; border-radius: 50%; }
        #basket { width: 70px; height: 15px; background: var(--primary); position: absolute; bottom: 0; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="text-align:center; padding-top:100px;"><h1>ChatMiFan</h1>
    <input type="text" id="login-user" placeholder="Tên tài khoản"><br>
    <button onclick="handleLogin()">Đăng nhập</button></div>
</div>

<div id="main-app" class="hidden">
    <header style="background:white; padding:10px; display:flex; justify-content:space-around; align-items:center; position:sticky; top:0; z-index:100;">
        <div class="header-icon" onclick="showPage('games')">🎮</div>
        <strong>ChatMiFan</strong>
        <div id="online-count" style="font-size:11px;">142 đang online</div>
    </header>

    <div id="page-home" class="page container">
        <div class="card"><input type="text" id="post-text" placeholder="Đăng gì đó..."> <button onclick="addPost()">Đăng</button></div>
        <div id="newsfeed"></div>
    </div>

    <div id="page-games" class="page container hidden">
        <div class="card">
            <h3>Bảng Xếp Hạng</h3>
            <div id="leaderboard"></div>
        </div>
        <div class="card">
            <h3>Game Hứng quà</h3>
            <div id="game-canvas" onmousemove="moveBasket(event)"><div id="basket"></div></div>
            <button onclick="startGame()">Bắt đầu chơi</button>
        </div>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('cmf_users')) || {};
    let currentUser = JSON.parse(localStorage.getItem('cmf_me'));

    function handleLogin() {
        let u = document.getElementById('login-user').value;
        if(!u) return;
        if(!users[u]) users[u] = { name: u, score: 0 };
        currentUser = users[u];
        localStorage.setItem('cmf_me', JSON.stringify(currentUser));
        localStorage.setItem('cmf_users', JSON.stringify(users));
        location.reload();
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.add('hidden'));
        document.getElementById('page-' + p).classList.remove('hidden');
        if(p === 'games') updateLeaderboard();
    }

    function updateLeaderboard() {
        let sorted = Object.values(users).sort((a,b) => b.score - a.score);
        document.getElementById('leaderboard').innerHTML = sorted.map((u,i) => `<div>${i+1}. ${u.name}: ${u.score}đ</div>`).join('');
    }

    let basketX = 0;
    function moveBasket(e) {
        basketX = e.clientX - 100;
        document.getElementById('basket').style.left = basketX + 'px';
    }

    function startGame() {
        let score = 0;
        let canvas = document.getElementById('game-canvas');
        let game = setInterval(() => {
            let item = document.createElement('div');
            item.className = 'item';
            item.style.left = Math.random() * 250 + 'px';
            canvas.appendChild(item);
            let pos = 0;
            let fall = setInterval(() => {
                pos += 5;
                item.style.top = pos + 'px';
                if(pos > 220 && parseInt(item.style.left) > basketX && parseInt(item.style.left) < basketX + 70) {
                    score++; item.remove();
                }
                if(pos > 250) { clearInterval(fall); item.remove(); }
                if(score >= 5) {
                    clearInterval(game); clearInterval(fall);
                    alert("Thắng! +10 điểm");
                    currentUser.score += 10;
                    localStorage.setItem('cmf_me', JSON.stringify(currentUser));
                    localStorage.setItem('cmf_users', JSON.stringify(users));
                    updateLeaderboard();
                }
            }, 30);
        }, 1000);
    }

    // Khởi tạo
    if(currentUser) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
    }
    setInterval(() => document.getElementById('online-count').innerText = (120 + Math.floor(Math.random()*30)) + " online", 5000);
</script>
</body>
</html>
